<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐动画测试</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        canvas {
            border: 2px solid #444;
            margin: 20px auto;
            display: block;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background: #4a4a4a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #5a5a5a;
        }
    </style>
</head>
<body>
    <h1>音乐动画测试页面</h1>
    <canvas id="testCanvas" width="300" height="200"></canvas>
    <div>
        <button id="startBtn">开始动画</button>
        <button id="stopBtn">停止动画</button>
    </div>

    <script>
        let animationId = null;
        let time = 0;
        const canvas = document.getElementById('testCanvas');
        const ctx = canvas.getContext('2d');
        
        // 生成测试数据（更慢更随机）
        function generateTestData() {
            const data = new Uint8Array(50);
            const slowTime = time * 0.2; // 进一步减慢时间因子
            
            for (let i = 0; i < data.length; i++) {
                // 生成更加随机和自然的数据来模拟音频，变化更慢
                data[i] = Math.floor(
                    Math.abs(Math.sin(slowTime / 500 + i / 10) * 100) + 
                    Math.abs(Math.sin(slowTime / 250 + i / 20) * 70) +
                    Math.abs(Math.cos(slowTime / 300 + i / 15) * 50) +
                    Math.random() * 40
                );
            }
            return data;
        }
        
        // 控制帧率的绘制函数
        let lastTime = 0;
        const frameInterval = 300; // 增加到300毫秒，进一步减慢动画更新频率
        
        function controlledDraw(timestamp) {
            // 控制帧率
            if (timestamp - lastTime < frameInterval) {
                animationId = requestAnimationFrame(controlledDraw);
                return;
            }
            
            lastTime = timestamp;
            
            // 清除画布
            ctx.fillStyle = 'rgb(29,19,62)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 生成测试数据
            const data = generateTestData();
            
            // 绘制柱状图
            const barWidth = canvas.width / data.length;
            for (let i = 0; i < data.length; i++) {
                const barHeight = data[i];
                const x = i * barWidth;
                const y = canvas.height - barHeight;
                
                // 创建渐变色
                const gradient = ctx.createLinearGradient(0, y, 0, canvas.height);
                gradient.addColorStop(0, '#68b3ec');
                gradient.addColorStop(0.5, '#4b5fc9');
                gradient.addColorStop(1, '#68b3ec');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, y, barWidth - 2, barHeight);
            }
            
            // 绘制跳动的方块
            for (let i = 0; i < data.length; i++) {
                const barHeight = data[i];
                const x = i * barWidth;
                const y = canvas.height - barHeight - 10;
                
                ctx.fillStyle = '#3e47a0';
                ctx.fillRect(x, y, barWidth - 2, 4);
            }
            
            time++;
            animationId = requestAnimationFrame(controlledDraw);
        }
        
        // 启动动画
        document.getElementById('startBtn').addEventListener('click', function() {
            if (!animationId) {
                time = 0;
                lastTime = 0;
                controlledDraw();
            }
        });
        
        // 停止动画
        document.getElementById('stopBtn').addEventListener('click', function() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        });
    </script>
</body>
</html>
