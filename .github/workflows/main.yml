name: Android CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'adopt'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3.5.0
      with:
        api-level: 30
        build-tools: "30.0.3"
        ndk-version: "21.4.7075529"

    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build debug APK
      run: ./gradlew assembleDebug
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        JAVA_HOME: ${{ env.JAVA_HOME }}

    - name: Build release APK
      run: ./gradlew assembleRelease
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        JAVA_HOME: ${{ env.JAVA_HOME }}

    - name: List build outputs
      run: ls -la app/build/outputs/apk/debug/ app/build/outputs/apk/release/

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Create release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        name: Release ${{ github.ref_name }}
        body: |
          ## 📦 Build Artifacts
          
          ### Debug APK
          - `app-debug.apk` - Debug build for testing
          
          ### Release APK
          - `app-release.apk` - Production-ready build
          
          ## 🚀 Changes
          - Automated build from CI
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit build artifacts to branch
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        # Create build directory if not exists
        mkdir -p build_artifacts
        
        # Copy APKs to build directory
        cp app/build/outputs/apk/debug/*.apk build_artifacts/ || true
        cp app/build/outputs/apk/release/*.apk build_artifacts/ || true
        
        # Check if there are changes
        if [ -n "$(git status --porcelain)" ]; then
          git add build_artifacts/
          git commit -m "chore: update build artifacts [CI]"
          git push
        else
          echo "No changes to commit"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}